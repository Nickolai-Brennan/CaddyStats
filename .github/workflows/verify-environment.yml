name: Verify Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify environment baselines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shared env template
        run: bash scripts/verify/validate-env.sh .env.example
      - name: Validate docs and architecture entrypoints
        run: make verify
