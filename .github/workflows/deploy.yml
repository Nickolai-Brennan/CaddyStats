name: Deploy Baseline

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - development
          - staging
          - production
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-artifacts:
    name: Build deployment artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements/prod.txt
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install API production dependencies
        run: python -m pip install -r services/api/requirements/prod.txt
      - name: Build web artifact
        run: pnpm --filter web build
      - name: Validate docker artifacts
        run: bash scripts/verify/docker-validate.sh --build

  deploy-baseline:
    name: Deployment gate
    runs-on: ubuntu-latest
    needs: build-artifacts
    environment: ${{ github.event.inputs.target_environment || 'production' }}
    steps:
      - name: Deployment placeholder
        run: |
          echo "Deployment provider wiring is intentionally gated until hosting credentials, OIDC, and environment protection rules are finalized."
          echo "This workflow establishes the build, environment, and approval baseline only."
