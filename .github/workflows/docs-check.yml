name: Docs Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]

permissions:
  contents: read

jobs:
  docs-required:
    name: Require Docs Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - '.github/CODEOWNERS'
              - '.github/ISSUE_TEMPLATE/**'
              - '.github/pull_request_template.md'
              - '.env.example'
              - 'config/environments/**'
            code_or_platform:
              - 'apps/**'
              - 'services/**'
              - 'packages/**'
              - 'workers/**'
              - 'database/**'
              - 'api/**'
              - 'backend/**'
              - 'frontend/**'
              - 'infrastructure/**'
              - 'tests/**'
              - 'scripts/**'
              - 'config/**'
              - '.github/workflows/**'
      - name: Enforce docs updates for code or platform PRs
        if: steps.changes.outputs.code_or_platform == 'true' && steps.changes.outputs.docs != 'true'
        run: |
          echo "Code or platform changes were detected, but no documentation updates were found."
          echo "Please update docs/, README.md, CONTRIBUTING.md, or governance templates in this pull request."
          exit 1
