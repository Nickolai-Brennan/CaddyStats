name: Stack Verify

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify stack baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository baseline
        run: make verify
      - name: Validate docker compose baseline
        run: bash scripts/verify/docker-validate.sh
