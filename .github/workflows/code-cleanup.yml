name: Code Cleanup

on:
  schedule:
    # Daily run for Prettier + Ruff formatting/lint checks across web and API codebases.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-formatting:
    name: Check Formatting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements/dev.txt

      - name: Install API dev dependencies
        run: pip install -r services/api/requirements/dev.txt

      - name: Ruff format check
        run: ruff format --check services/api/

      - name: Ruff lint check
        run: ruff check services/api/
