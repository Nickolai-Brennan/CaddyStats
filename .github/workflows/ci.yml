name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements/dev.txt
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install API dependencies
        run: python -m pip install -r services/api/requirements/dev.txt
      - name: Run lint
        run: make lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements/dev.txt
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install API dependencies
        run: python -m pip install -r services/api/requirements/dev.txt
      - name: Run type checks
        run: make typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://caddystats:caddystats_test@127.0.0.1:5433/caddystats_test
      REDIS_URL: redis://127.0.0.1:6380/0
      JWT_SECRET_KEY: test-secret-key-for-ci-only
      APP_SECRET_KEY: test-app-secret-for-ci-only
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CSP_REPORT_ONLY: true
      RATE_LIMIT_ENABLED: false
      VITE_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements/dev.txt
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install API dependencies
        run: python -m pip install -r services/api/requirements/dev.txt
      - name: Run tests
        run: make test

  docker-validate:
    name: Docker Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Validate docker baseline
        run: bash scripts/verify/docker-validate.sh --build

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    permissions: {}
    needs: [lint, typecheck, test, docker-validate]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
