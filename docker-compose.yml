name: caddystats

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: caddystats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-caddystats}
      POSTGRES_USER: ${POSTGRES_USER:-caddystats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caddystats_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schemas:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caddystats} -d ${POSTGRES_DB:-caddystats}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caddystats

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: caddystats-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-caddystats_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-caddystats_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caddystats

  # ---------------------------------------------------------------------------
  # API (FastAPI)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    container_name: caddystats-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-caddystats}:${POSTGRES_PASSWORD:-caddystats_dev}@postgres:5432/${POSTGRES_DB:-caddystats}
      REDIS_URL: redis://:${REDIS_PASSWORD:-caddystats_dev}@redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - caddystats

  # ---------------------------------------------------------------------------
  # Web (React/Vite)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: caddystats-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - caddystats

  # ---------------------------------------------------------------------------
  # Nginx (reverse proxy)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: caddystats-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - web
    networks:
      - caddystats

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  caddystats:
    driver: bridge
